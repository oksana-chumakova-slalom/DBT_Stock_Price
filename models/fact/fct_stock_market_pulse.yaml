version: 2

models:
  - name: fct_stock_market_pulse
    description: "The final analysis table for stock volatility and inflation-adjusted returns."
    columns:
      - name: ticker
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_of_type:
              arguments:
                column_type: varchar
          - relationships:
              arguments: # Fix for "field" and "to" error
                to: ref('int_market_activity_unified')
                field: ticker

      - name: trading_date
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_of_type:
              arguments:
                column_type: date

      - name: nominal_return_pct
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: -100
                max_value: 500
              config: # Fix for "severity" error (migrated from top-level to config)
                severity: warn
          - dbt_expectations.expect_column_values_to_be_of_type:
              arguments:
                column_type: float

      - name: is_filing_day
        tests:
          - not_null
          - accepted_values:
              arguments: # Fix for "values" error
                values: [true, false]
          - dbt_expectations.expect_column_values_to_be_of_type:
              arguments:
                column_type: boolean

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [ticker, trading_date]
      - dbt_expectations.expect_table_columns_to_match_ordered_list:
          arguments:
            column_list: ["company_name", "ticker", "trading_date", "close_price", "nominal_return_pct", "inflation_index_value", "filing_types", "is_filing_day"]