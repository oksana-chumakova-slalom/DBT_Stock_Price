version: 2

models:
  - name: int_market_activity_unified
    description: "The 'Security Master' join. Links daily stock prices to company metadata and SEC CIK identifiers."
    columns:
      - name: ticker
        tests:
          - not_null
          - dbt_utils.at_least_one 

      - name: cik
        tests:
          - not_null

      - name: trading_date
        tests:
          - not_null

    tests:
      # Moved 'combination_of_columns' inside 'arguments' to satisfy dbt 1.9+ requirements
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [ticker, trading_date]