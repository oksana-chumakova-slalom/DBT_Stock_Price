version: 2

sources:
  - name: public_data_free
    database: SNOWFLAKE_PUBLIC_DATA_FREE
    schema: PUBLIC_DATA_FREE
    tables:
      - name: sec_report_index
      - name: company_index
      - name: financial_economic_indicators_timeseries

  - name: stock_price_timeseries
    database: snowflake_learning_db
    schema: dbt_ochumakova
    tables:
      - name: stock_price_timeseries
        description: "Daily stock market prices"
        # New dbt 1.9 syntax: freshness and loaded_at_field move inside 'config'
        config:
          freshness:
            error_after:
              count: 24
              period: hour
          loaded_at_field: '"DATE"::timestamp_ltz'